<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}html,body{margin:0;padding:0;background:#EDEAE3}a{text-decoration:none;color:inherit}</style>
</helmet>
<div style="display:flex;min-height:100vh;background:#F4F2EF;font-family:'Inter',system-ui,sans-serif;color:#1B1D20">
  <dc-import name="AdminSidebar" active="cuaderno" hint-size="248px,100vh"></dc-import>

  <div style="flex:1;min-width:0">
    <header style="position:sticky;top:0;z-index:10;background:rgba(244,242,239,.9);backdrop-filter:blur(8px);border-bottom:1px solid #e0dcd2;padding:22px 40px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1 style="margin:0;font-family:'Playfair Display',serif;font-weight:500;font-size:30px;line-height:1;color:#1A1C1F">Cuaderno</h1>
        <div style="margin-top:6px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:#9a988f">{{ count }} ENTRADAS · {{ published }} PUBLICADAS · {{ drafts }} BORRADORES</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="Buscar…" style="height:44px;width:220px;border:1px solid #cbc7bc;border-radius:3px;background:#fff;padding:0 16px;font-size:13.5px;outline:none">
        <a href="Dashboard-Cuaderno-new.dc.html" style="height:44px;display:flex;align-items:center;gap:10px;padding:0 20px;background:#0D0D0E;border-radius:3px;color:#F4F2EF;font-size:13.5px">＋ Nuevo artículo</a>
      </div>
    </header>

    <main style="padding:28px 40px 56px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px">
        <span style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;color:#a5a29a;margin-right:4px">ESTADO</span>
        <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
          <button onClick="{{ f.onClick }}" style="{{ f.style }}">{{ f.label }}</button>
        </sc-for>
      </div>

      <div style="background:#fff;border:1px solid #e5e1d7;border-radius:9px;overflow:hidden">
        <div style="display:grid;grid-template-columns:72px 1fr 130px 120px 110px 60px;gap:18px;padding:14px 22px;border-bottom:1px solid #eee9df;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;color:#a5a29a">
          <span></span><span>TÍTULO</span><span>TIPO</span><span>ESTADO</span><span>FECHA</span><span></span>
        </div>
        <sc-for list="{{ rows }}" as="r" hint-placeholder-count="8">
          <a href="{{ r.href }}" style="display:grid;grid-template-columns:72px 1fr 130px 120px 110px 60px;gap:18px;padding:16px 22px;border-bottom:1px solid #f2 efe6;align-items:center" style-hover="background:#faf8f3">
            <div style="position:relative;width:72px;height:52px;border-radius:4px;overflow:hidden;background:#15130e"><img src="{{ r.thumb }}" alt="" style="width:100%;height:100%;object-fit:cover"></div>
            <div style="min-width:0">
              <div style="font-size:15px;color:#1B1D20;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:9px">{{ r.title }}<sc-if value="{{ r.featured }}" hint-placeholder-val="{{ false }}"><span style="font-size:9px;letter-spacing:.1em;color:#1f8a5b;background:rgba(31,138,91,.12);border-radius:12px;padding:3px 8px">★ DESTACADO</span></sc-if></div>
              <div style="margin-top:4px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.06em;color:#a5a29a">{{ r.category }}</div>
            </div>
            <span style="font-size:12px;color:#55565a;text-transform:capitalize">{{ r.type }}</span>
            <span style="{{ r.badgeStyle }}">{{ r.badge }}</span>
            <span style="font-family:'Space Mono',monospace;font-size:11px;color:#8a887f">{{ r.date }}</span>
            <span style="font-size:17px;color:#1B1D20;justify-self:end">→</span>
          </a>
        </sc-for>
      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { loaded:false, posts:[], query:'', filter:'all' };
  async componentDidMount(){ try{ this.db=await import('./data.js'); this.setState({loaded:true,posts:this.db.getPosts({includeAll:true})}); }catch(e){ console.error(e); } }
  renderVals(){
    const s=this.state; const q=s.query.trim().toLowerCase();
    let rows=s.posts.filter(p=>s.filter==='all'?true:p.status===s.filter);
    if(q) rows=rows.filter(p=>(p.title+' '+p.category).toLowerCase().includes(q));
    const badge=(c,bg)=>({fontSize:'10px',letterSpacing:'.1em',color:c,background:bg,borderRadius:'20px',padding:'6px 12px',width:'fit-content',whiteSpace:'nowrap'});
    const meta={published:['Publicado','#2F5DAA','rgba(47,93,170,.1)'],draft:['Borrador','#b07a1e','rgba(176,122,30,.13)'],archived:['Archivado','#6b6c66','rgba(107,108,102,.14)']};
    const chip=(active)=>({height:'34px',padding:'0 15px',borderRadius:'20px',fontSize:'12px',cursor:'pointer',fontFamily:"'Inter',sans-serif",border:active?'1px solid #1B1D20':'1px solid #cbc7bc',background:active?'#1B1D20':'transparent',color:active?'#F4F2EF':'#55565a'});
    const mk=(k,l)=>({label:l,onClick:()=>this.setState({filter:k}),style:chip(s.filter===k)});
    return {
      count:s.posts.length, published:s.posts.filter(p=>p.status==='published').length, drafts:s.posts.filter(p=>p.status==='draft').length,
      query:s.query, onSearch:(e)=>this.setState({query:e.target.value}),
      filters:[mk('all','Todo'),mk('published','Publicados'),mk('draft','Borradores'),mk('archived','Archivados')],
      rows:rows.map(p=>{const m=meta[p.status]||meta.archived;return {title:p.title,category:(p.category||'').toUpperCase(),type:p.type,featured:p.featured,thumb:p.heroImage,date:p.publishedAt||'—',badge:m[0],badgeStyle:badge(m[1],m[2]),href:'Dashboard-Cuaderno-edit.dc.html?id='+p.id};}),
    };
  }
}
</script>
</body>
</html>
