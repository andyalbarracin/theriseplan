<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</helmet>
<aside style="width:248px;min-width:248px;min-height:100vh;background:#0D0D0E;color:#b7b5ad;display:flex;flex-direction:column;padding:26px 18px;font-family:'Inter',system-ui,sans-serif;position:sticky;top:0;align-self:flex-start;height:100vh">
  <a href="Dashboard.dc.html" style="display:flex;align-items:center;gap:12px;text-decoration:none;padding:0 8px 4px">
    <span style="display:inline-flex;font-family:'Playfair Display',serif;font-size:26px;color:#F4F2EF"><span>A</span><span style="margin-left:-.34em">A</span></span>
    <span style="font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.18em;color:#6f6d66;line-height:1.3">ARCHIVO<br>ADMIN · CMS</span>
  </a>
  <nav style="margin-top:30px;display:flex;flex-direction:column;gap:3px">
    <sc-for list="{{ nav }}" as="item" hint-placeholder-count="8">
      <a href="{{ item.url }}" style="{{ item.style }}">
        <span style="{{ item.dot }}"></span>{{ item.label }}
      </a>
    </sc-for>
  </nav>
  <div style="margin-top:auto;display:flex;flex-direction:column;gap:4px;border-top:1px solid rgba(244,242,239,.09);padding-top:16px">
    <a href="Homepage.dc.html" style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:#8f8d85;text-decoration:none">↗ Ver sitio</a>
    <a href="Login.dc.html" style="display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:13px;color:#8f8d85;text-decoration:none">← Cerrar sesión</a>
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px 4px">
      <div style="width:30px;height:30px;border-radius:50%;background:#2F5DAA;color:#F4F2EF;display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:14px">A</div>
      <div style="line-height:1.25"><div style="font-size:12.5px;color:#d9d7d0">Andy Albarracín</div><div style="font-size:10px;color:#6f6d66">Editor</div></div>
    </div>
  </div>
</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;active&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  renderVals(){
    const active=this.props.active||'dashboard';
    const items=[
      ['Dashboard','Dashboard.dc.html','dashboard'],
      ['Cuaderno','Dashboard-Cuaderno.dc.html','cuaderno'],
      ['Proyectos','Dashboard-Proyectos.dc.html','proyectos'],
      ['Media','Dashboard-Media.dc.html','media'],
      ['Inicio · Home','Dashboard-Home.dc.html','home'],
      ['SEO','Dashboard-SEO.dc.html','seo'],
      ['Navegación','Dashboard-Navigation.dc.html','navigation'],
      ['Ajustes','Dashboard-Ajustes.dc.html','ajustes'],
    ];
    const nav=items.map(([label,url,key])=>{
      const cur=key===active;
      return { label, url,
        style:{display:'flex',alignItems:'center',gap:'12px',padding:'11px 14px',borderRadius:'7px',fontSize:'14px',textDecoration:'none',letterSpacing:'.01em',
          color:cur?'#F4F2EF':'#918f87',background:cur?'rgba(47,93,170,0.18)':'transparent',
          borderLeft:cur?'2px solid #2F5DAA':'2px solid transparent'},
        dot:{width:'5px',height:'5px',borderRadius:'50%',flex:'none',background:cur?'#2F5DAA':'rgba(145,143,135,0.4)'} };
    });
    return { nav };
  }
}
</script>
</body>
</html>
