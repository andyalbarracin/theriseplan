<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>*{box-sizing:border-box}html,body{margin:0;padding:0;background:#EDEAE3}a{text-decoration:none;color:inherit}</style>
</helmet>
<div style="display:flex;min-height:100vh;background:#F4F2EF;font-family:'Inter',system-ui,sans-serif;color:#1B1D20">
  <dc-import name="AdminSidebar" active="proyectos" hint-size="248px,100vh"></dc-import>

  <div style="flex:1;min-width:0">
    <header style="position:sticky;top:0;z-index:10;background:rgba(244,242,239,.9);backdrop-filter:blur(8px);border-bottom:1px solid #e0dcd2;padding:22px 40px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <h1 style="margin:0;font-family:'Playfair Display',serif;font-weight:500;font-size:30px;line-height:1;color:#1A1C1F">Proyectos</h1>
        <div style="margin-top:6px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.12em;color:#9a988f">{{ count }} PROYECTOS · {{ pub }} PÚBLICOS · {{ hidden }} PRIVADOS</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        <input value="{{ query }}" onInput="{{ onSearch }}" placeholder="Buscar…" style="height:44px;width:220px;border:1px solid #cbc7bc;border-radius:3px;background:#fff;padding:0 16px;font-size:13.5px;outline:none">
        <a href="Dashboard-Proyectos-new.dc.html" style="height:44px;display:flex;align-items:center;gap:10px;padding:0 20px;background:#0D0D0E;border-radius:3px;color:#F4F2EF;font-size:13.5px">＋ Nuevo proyecto</a>
      </div>
    </header>

    <main style="padding:28px 40px 56px">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:20px">
        <sc-for list="{{ cards }}" as="c" hint-placeholder-count="6">
          <a href="{{ c.href }}" style="background:#fff;border:1px solid #e5e1d7;border-radius:10px;overflow:hidden;display:block" style-hover="border-color:#2F5DAA;box-shadow:0 10px 26px -14px rgba(20,18,14,.3)">
            <div style="position:relative;width:100%;aspect-ratio:16/10;overflow:hidden;background:#15130e">
              <img src="{{ c.thumb }}" alt="" style="width:100%;height:100%;object-fit:cover">
              <span style="position:absolute;left:12px;top:12px;{{ c.badgeStyle }}">{{ c.badge }}</span>
              <sc-if value="{{ c.sensitive }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;right:12px;top:12px;font-size:9px;letter-spacing:.1em;color:#F4F2EF;background:rgba(162,59,59,.85);border-radius:12px;padding:4px 10px">🔒 PRIVADO</span></sc-if>
            </div>
            <div style="padding:18px 20px 20px">
              <div style="display:flex;align-items:center;justify-content:space-between">
                <h3 style="margin:0;font-family:'Playfair Display',serif;font-weight:500;font-size:23px;color:#1B1D20">{{ c.title }}</h3>
                <sc-if value="{{ c.featured }}" hint-placeholder-val="{{ false }}"><span style="font-size:15px;color:#1f8a5b">★</span></sc-if>
              </div>
              <div style="margin-top:5px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.1em;color:#a5a29a">{{ c.type }} · {{ c.timeline }}</div>
              <p style="margin:12px 0 0;font-size:13px;line-height:1.5;color:#55565a;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden">{{ c.desc }}</p>
            </div>
          </a>
        </sc-for>
      </div>
    </main>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = { loaded:false, projects:[], query:'' };
  async componentDidMount(){ try{ this.db=await import('./data.js'); this.setState({loaded:true,projects:this.db.getProjects({includeAll:true})}); }catch(e){ console.error(e); } }
  renderVals(){
    const s=this.state; const q=s.query.trim().toLowerCase();
    let list=s.projects; if(q) list=list.filter(p=>(p.title+' '+p.type+' '+(p.tags||[]).join(' ')).toLowerCase().includes(q));
    const badge=(c,bg)=>({fontSize:'9px',letterSpacing:'.1em',color:c,background:bg,borderRadius:'12px',padding:'5px 11px',whiteSpace:'nowrap',backdropFilter:'blur(2px)'});
    const meta=(pr)=>{ if(pr.visibility!=='public'||pr.sensitive) return ['Privado','#F4F2EF','rgba(162,59,59,.7)'];
      return {active:['Activo','#eafff0','rgba(31,138,91,.75)'],building:['Construyendo','#eaf1ff','rgba(47,93,170,.75)'],paused:['En pausa','#fff3e0','rgba(176,122,30,.8)'],archived:['Archivado','#f0f0ee','rgba(60,60,58,.7)'],draft:['Borrador','#f0f0ee','rgba(60,60,58,.7)']}[pr.status]||['—','#fff','rgba(60,60,58,.7)']; };
    return {
      count:s.projects.length, pub:s.projects.filter(p=>p.visibility==='public'&&!p.sensitive&&p.status!=='draft').length, hidden:s.projects.filter(p=>p.visibility!=='public'||p.sensitive).length,
      query:s.query, onSearch:(e)=>this.setState({query:e.target.value}),
      cards:list.map(pr=>{const m=meta(pr);return {title:pr.title,type:(pr.type||'').toUpperCase(),timeline:pr.timeline||'—',desc:pr.shortDescription,thumb:pr.heroImage,featured:pr.featured,sensitive:pr.sensitive||pr.visibility==='hidden',badge:m[0],badgeStyle:badge(m[1],m[2]),href:'Dashboard-Proyectos-edit.dc.html?id='+pr.id};}),
    };
  }
}
</script>
</body>
</html>
